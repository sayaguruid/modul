<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Admin — Kelola Materi</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<style>
:root{--p:#0D7C66;--pd:#095C4B;--pdd:#063D33;--pl:#E6F5F1;--a:#D4942A;--al:#FFF7EB;--bg:#F0F4F8;--c:#FFF;--t:#1A2332;--t2:#4A5568;--tm:#8896A6;--b:#E2E8F0;--bl:#F1F5F9;--ok:#10B981;--okl:#ECFDF5;--wn:#F59E0B;--wnl:#FFFBEB;--er:#EF4444;--erl:#FEF2F2;--r:10px;--rs:7px;--tr:.2s ease}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--t);line-height:1.5}button{font-family:inherit;cursor:pointer;border:none;background:none}input,select,textarea{font-family:inherit}::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--b);border-radius:3px}
#TB{position:fixed;top:12px;right:12px;z-index:9999;display:flex;flex-direction:column;gap:5px}.tt{padding:10px 14px;border-radius:var(--rs);font-size:11.5px;font-weight:600;color:#fff;box-shadow:0 4px 12px rgba(0,0,0,.12);animation:tI .2s ease}.tt.ok{background:var(--ok)}.tt.er{background:var(--er)}.tt.in{background:var(--p)}@keyframes tI{from{transform:translateX(100%);opacity:0}to{transform:none;opacity:1}}
#LD{position:fixed;inset:0;background:rgba(240,244,248,.75);z-index:9990;display:none;align-items:center;justify-content:center}#LD.on{display:flex}.sp{width:28px;height:28px;border:3px solid var(--b);border-top-color:var(--p);border-radius:50%;animation:ro .5s linear infinite}@keyframes ro{to{transform:rotate(360deg)}}
.top{height:50px;background:var(--c);border-bottom:1px solid var(--b);display:flex;align-items:center;padding:0 16px;gap:10px;position:sticky;top:0;z-index:50}.top span{font-size:13px;font-weight:700}.top .logo{color:var(--p);font-weight:800}.top .sep{width:1px;height:24px;background:var(--b)}.top .back{font-size:12px;color:var(--tm);cursor:pointer;transition:var(--tr);margin-left:auto}.top .back:hover{color:var(--p)}
.wrap{display:flex;height:calc(100vh - 50px)}
.side{width:280px;background:var(--c);border-right:1px solid var(--b);overflow-y:auto;flex-shrink:0}
.side-hd{padding:10px 12px;border-bottom:1px solid var(--b);display:flex;align-items:center;gap:6px}
.side-hd input{flex:1;height:32px;padding:0 8px;border:1px solid var(--b);border-radius:var(--rs);font-size:11.5px;outline:none}
.side-hd input:focus{border-color:var(--p)}
.mi{padding:10px 12px;border-bottom:1px solid var(--bl);cursor:pointer;transition:var(--tr);display:flex;gap:8px;align-items:flex-start}.mi:hover{background:var(--pl)}.mi.ac{background:var(--pl);border-left:3px solid var(--p)}
.mi-c{font-size:9px;font-weight:700;color:var(--p);letter-spacing:.2px;flex-shrink:0;margin-top:1px}.mi-n{font-size:12px;font-weight:600;line-height:1.3}.mi-k{font-size:9.5px;color:var(--tm);margin-top:1px}
.main{flex:1;overflow-y:auto;padding:16px}
.tabs{display:flex;gap:4px;margin-bottom:14px}.tab{padding:6px 14px;border-radius:var(--rs);font-size:11.5px;font-weight:600;color:var(--tm);background:var(--c);border:1px solid var(--b);transition:var(--tr);cursor:pointer}.tab:hover{color:var(--p)}.tab.ac{color:#fff;background:var(--p);border-color:var(--p)}
.cd{background:var(--c);border-radius:var(--r);border:1px solid var(--b);padding:14px;margin-bottom:10px}
.stit{font-size:13px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:5px}.stit i{color:var(--p);font-size:11px}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}.fg1{display:grid;grid-template-columns:1fr;gap:8px;margin-bottom:10px}
.fl{display:flex;flex-direction:column;gap:3px}.fl label{font-size:10.5px;font-weight:600;color:var(--t2)}.fl input,.fl select,.fl textarea{height:36px;padding:0 10px;border:1.5px solid var(--b);border-radius:var(--rs);font-size:12px;outline:none;transition:var(--tr)}.fl input:focus,.fl select:focus,.fl textarea:focus{border-color:var(--p)}.fl textarea{height:120px;padding:8px 10px;resize:vertical;line-height:1.5}
.bt{display:inline-flex;align-items:center;justify-content:center;gap:4px;padding:7px 14px;border-radius:var(--rs);font-size:11.5px;font-weight:600;transition:var(--tr)}.bt-p{background:var(--p);color:#fff}.bt-p:hover{background:var(--pd)}.bt-o{border:1.5px solid var(--b);color:var(--t2)}.bt-o:hover{border-color:var(--p);color:var(--p)}.bt-d{background:var(--er);color:#fff}.bt-a{background:var(--a);color:#fff}.bt-sm{padding:4px 9px;font-size:10.5px}
.emp{text-align:center;padding:30px;color:var(--tm);font-size:12px}
.item-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid var(--b);border-radius:var(--rs);margin-bottom:6px;background:var(--c);transition:var(--tr)}.item-row:hover{border-color:var(--p)}.item-info{flex:1;min-width:0}.item-title{font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.item-sub{font-size:10px;color:var(--tm)}.item-badge{font-size:9px;font-weight:600;padding:2px 7px;border-radius:10px;text-transform:uppercase;letter-spacing:.3px}.item-badge.pdf{background:#FEE2E2;color:#DC2626}.item-badge.youtube{background:#FEE2E2;color:#FF0000}.item-badge.link{background:var(--al);color:var(--a)}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:200;display:none;align-items:center;justify-content:center;padding:16px}.mo.on{display:flex}.md{background:var(--c);border-radius:var(--r);box-shadow:0 6px 16px rgba(0,0,0,.08);max-width:320px;width:100%;padding:18px}.md h3{font-size:14px;font-weight:700;margin-bottom:4px}.md p{font-size:11.5px;color:var(--t2);margin-bottom:12px;line-height:1.4}.md-a{display:flex;gap:5px;justify-content:flex-end}
.fi{animation:fi .2s ease}@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
@media(max-width:768px){.side{width:200px}.fg{grid-template-columns:1fr}.wrap{flex-direction:column;height:auto}.side{height:40vh;border-right:none;border-bottom:1px solid var(--b)}}
</style>
</head>
<body>
<div id="TB"></div><div id="LD"><div class="sp"></div></div>
<div class="top"><span class="logo"><i class="fas fa-flask"></i></span><span>e-Lab</span><span class="sep"></span><span>Admin Panel</span><span class="back" onclick="window.open('index.html','_blank')"><i class="fas fa-external-link-alt"></i> Buka Aplikasi</span></div>
<div class="wrap">
<div class="side"><div class="side-hd"><i class="fas fa-search" style="color:var(--tm);font-size:12px"></i><input type="text" id="srcInp" placeholder="Cari materi..."></div><div id="mList"></div></div>
<div class="main" id="mPanel"><div class="emp"><i class="fas fa-arrow-left" style="font-size:24px;display:block;margin-bottom:8px;opacity:.3"></i>Pilih materi di sidebar untuk mulai mengelola</div></div>
</div>
<div class="mo" id="CFM"><div class="md"><h3 id="cft"></h3><p id="cfm"></p><div class="md-a"><button class="bt bt-o" onclick="clCF()">Batal</button><button class="bt bt-d" id="cfok">Ya</button></div></div></div>

<script>
const API='https://script.google.com/macros/s/AKfycbwsagEj_jWjmv_RwH-jkgOrT5YZ0bk1KdDf7iGrJGFOTu5C0wxvmYnxpvlxxaF_Mwih/exec';
let ML=[],CM=null,CTAB='info';
const $=id=>document.getElementById(id);const qs=(s,c)=>(c||document).querySelector(s);const qa=(s,c)=>(c||document).querySelectorAll(s);
function toast(m,t){const d=document.createElement('div');d.className='tt '+(t||'in');d.textContent=m;$('TB').appendChild(d);setTimeout(()=>{d.style.opacity='0';setTimeout(()=>d.remove(),200)},2200)}
function sL(){$('LD').classList.add('on')}function hL(){$('LD').classList.remove('on')}
function api(p){return new Promise((ok,no)=>{const c='_a'+Date.now()+Math.random().toString(36).substr(2,3),s=document.createElement('script');let u=API+'?callback='+c;for(let k in p)u+='&'+encodeURIComponent(k)+'='+encodeURIComponent(p[k]);window[c]=d=>{delete window[c];if(s.parentNode)s.parentNode.removeChild(s);d.success?ok(d):no(d)};s.onerror=()=>{delete window[c];if(s.parentNode)s.parentNode.removeChild(s);no({message:'Gagal terhubung'})};s.src=u;document.head.appendChild(s);setTimeout(()=>{if(window[c]){delete window[c];if(s.parentNode)s.parentNode.removeChild(s);no({message:'Timeout'})}},20000)})}
let mCb=null;function opCF(t,m,cb){$('cft').textContent=t;$('cfm').textContent=m;mCb=cb;$('CFM').classList.add('on')}function clCF(){$('CFM').classList.remove('on');mCb=null}$('cfok').onclick=()=>{if(mCb)mCb();clCF()};

async function loadMList(){sL();try{const r=await api({action:'getAllMateri'});ML=r.data;rML()}catch(e){toast(e.message,'er')}finally{hL()}}
function rML(filter){const el=$('mList');let list=ML;if(filter)list=ML.filter(m=>(m.nama+' '+m.kode+' '+m.kategori).toLowerCase().indexOf(filter.toLowerCase())>=0);
el.innerHTML=list.map(m=>'<div class="mi'+(CM&&CM.id===m.id?' ac':'')+'" data-id="'+m.id+'"><div style="flex:1;min-width:0"><div class="mi-c">'+m.kode+'</div><div class="mi-n">'+m.nama+'</div><div class="mi-k">'+(m.kategori||'-')+'</div></div></div>').join('')||'<div class="emp" style="padding:20px">Tidak ditemukan</div>';
qa('.mi',el).forEach(i=>i.onclick=()=>selMateri(i.dataset.id))}
 $('srcInp').oninput=e=>rML(e.target.value);

async function selMateri(id){sL();try{const r=await api({action:'getMateriFull',materiId:id});CM=r.data.materi;CTAB='info';rML();renderPanel(r.data)}catch(e){toast(e.message,'er')}finally{hL()}}

function renderPanel(d){const el=$('mPanel'),m=d.materi;
el.innerHTML='<div class="fi"><div style="display:flex;align-items:center;gap:8px;margin-bottom:12px"><span style="font-size:10px;font-weight:700;color:var(--p)">'+m.kode+'</span><span style="font-size:15px;font-weight:800">'+m.nama+'</span></div><div class="tabs"><div class="tab'+(CTAB==='info'?' ac':'')+'" data-t="info"><i class="fas fa-info-circle"></i> Info</div><div class="tab'+(CTAP==='sub'?' ac':'')+'" data-t="sub"><i class="fas fa-book"></i> Sub Materi ('+d.submateri.length+')</div><div class="tab'+(CTAP==='soal'?' ac':'')+'" data-t="soal"><i class="fas fa-pen-to-square"></i> Soal ('+d.soal.length+')</div><div class="tab'+(CTAP==='lamp'?' ac':'')+'" data-t="lamp"><i class="fas fa-paperclip"></i> Lampiran ('+d.lampiran.length+')</div></div><div id="tabC"></div></div>';
qa('.tab',el).forEach(t=>t.onclick=()=>{CTAB=t.dataset.t;renderPanel(d)});
const tc=$('tabC');
if(CTAB==='info')tc.innerHTML=rInfo(m);
else if(CTAB==='sub')tc.innerHTML=rSub(d.submateri,m.id);
else if(CTAB==='soal')tc.innerHTML=rSoal(d.soal,m.id);
else tc.innerHTML=rLamp(d.lampiran,m.id);
bindPanel(d)}

function rInfo(m){return'<div class="cd"><form id="fInfo"><div class="fg"><div class="fl"><label>Kode</label><input type="text" id="fKode" value="'+m.kode+'" required></div><div class="fl"><label>Kategori</label><input type="text" id="fKat" value="'+(m.kategori||'')+'" placeholder="Lainnya"></div></div><div class="fg1"><div class="fl"><label>Nama Unit Kompetensi</label><input type="text" id="fNama" value="'+m.nama+'" required></div></div><div class="fg1"><div class="fl"><label>Deskripsi</label><textarea id="fDesk">'+m.deskripsi+'</textarea></div></div><div class="fg"><div class="fl"><label>Target Skor</label><input type="number" id="fTarget" value="'+m.targetSkor+'"></div><div class="fl"><label>Urutan</label><input type="number" id="fUrut" value="'+m.urutan+'"></div></div><div style="display:flex;gap:6px;margin-top:8px"><button type="button" class="bt bt-p" onclick="svMateri()"><i class="fas fa-save"></i> Simpan</button><button type="button" class="bt bt-d" onclick="delMateri()"><i class="fas fa-trash"></i> Hapus Materi</button></div></form></div>'}

function rSub(list,mid){let items=list.map(s=>'<div class="item-row"><div class="item-info"><div class="item-title">'+s.judul+'</div><div class="item-sub">Urutan: '+s.urutan+'</div></div><div style="display:flex;gap:4px"><button class="bt bt-sm bt-o" onclick="edSub(\''+s.id+'\')"><i class="fas fa-edit"></i></button><button class="bt bt-sm bt-d" onclick="delSub(\''+s.id+'\')"><i class="fas fa-trash"></i></button></div></div>').join('');
return'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><div></div><button class="bt bt-p bt-sm" onclick="addSub()"><i class="fas fa-plus"></i> Tambah Sub Materi</button></div>'+(items||'<div class="emp">Belum ada sub materi</div>')+'<div id="subForm"></div>'}

function rSoal(list,mid){let items=list.map((q,i)=>'<div class="item-row"><div class="item-info"><div class="item-title">Soal '+(i+1)+' — Jawaban: <b>'+q.jawaban+'</b> ('+q.skor+' poin)</div><div class="item-sub" style="white-space:normal;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">'+q.pertanyaan+'</div></div><div style="display:flex;gap:4px;flex-shrink:0"><button class="bt bt-sm bt-o" onclick="edSoal(\''+q.id+'\')"><i class="fas fa-edit"></i></button><button class="bt bt-sm bt-d" onclick="delSoal(\''+q.id+'\')"><i class="fas fa-trash"></i></button></div></div>').join('');
return'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><div></div><button class="bt bt-p bt-sm" onclick="addSoal()"><i class="fas fa-plus"></i> Tambah Soal</button></div>'+(items||'<div class="emp">Belum ada soal</div>')+'<div id="soalForm"></div>'}

function rLamp(list,mid){let items=list.map(l=>'<div class="item-row"><div class="item-info"><div class="item-title">'+l.judul+'</div><div class="item-sub">'+l.url+'</div></div><span class="item-badge '+l.jenis+'">'+l.jenis+'</span><div style="display:flex;gap:4px;flex-shrink:0"><button class="bt bt-sm bt-o" onclick="edLamp(\''+l.id+'\')"><i class="fas fa-edit"></i></button><button class="bt bt-sm bt-d" onclick="delLamp(\''+l.id+'\')"><i class="fas fa-trash"></i></button></div></div>').join('');
return'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><div></div><button class="bt bt-p bt-sm" onclick="addLamp()"><i class="fas fa-plus"></i> Tambah Lampiran</button></div>'+(items||'<div class="emp">Belum ada lampiran</div>')+'<div id="lampForm"></div>'}

async function svMateri(){sL();try{await api({action:'updateMateri',id:CM.id,kode:$('fKode').value,nama:$('fNama').value,deskripsi:$('fDesk').value,target_skor:$('fTarget').value,urutan:$('fUrut').value,kategori:$('fKat').value});toast('Materi disimpan','ok');loadMList();selMateri(CM.id)}catch(e){toast(e.message,'er')}finally{hL()}}
function delMateri(){opCF('Hapus Materi','SEMUA sub-materi, soal, lampiran, dan nilai untuk unit ini akan dihapus permanen!',async()=>{sL();try{await api({action:'deleteMateri',id:CM.id});CM=null;toast('Materi dihapus','ok');loadMList();$('mPanel').innerHTML='<div class="emp"><i class="fas fa-arrow-left" style="font-size:24px;display:block;margin-bottom:8px;opacity:.3"></i>Pilih materi di sidebar</div>'}catch(e){toast(e.message,'er')}finally{hL()}})}

function addSub(){$('subForm').innerHTML=subForm('');qs('#subForm .bt-p').onclick=()=>svSub('create');qs('#subForm .bt-o').onclick=()=>{$('subForm').innerHTML=''}}
function edSub(id){sL();api({action:'getMateriFull',materiId:CM.id}).then(r=>{const s=r.data.submateri.find(x=>x.id===id);hL();if(s)$('subForm').innerHTML=subForm(s);qs('#subForm .bt-p').onclick=()=>svSub('update',id);qs('#subForm .bt-o').onclick=()=>{$('subForm').innerHTML=''}}).catch(e=>{hL();toast(e.message,'er')})}
function subForm(s){return'<div class="cd fi" style="margin-top:10px"><div style="font-size:12px;font-weight:700;margin-bottom:8px">'+(s?'Edit':'Tambah')+' Sub Materi</div><div class="fg1"><div class="fl"><label>Judul</label><input type="text" id="sfJudul" value="'+(s?s.judul:'')+'" required></div></div><div class="fg1"><div class="fl"><label>Konten (HTML)</label><textarea id="sfKonten">'+(s?s.konten:'')+'</textarea></div></div><div class="fg"><div class="fl"><label>Urutan</label><input type="number" id="sfUrut" value="'+(s?s.urutan:'1')+'"></div></div><div style="display:flex;gap:5px"><button type="button" class="bt bt-p bt-sm"><i class="fas fa-save"></i> Simpan</button><button type="button" class="bt bt-o bt-sm">Batal</button></div></div>'}
async function svSub(act,id){const j=$('sfJudul').value.trim(),k=$('sfKonten').value,u=$('sfUrut').value;if(!j){toast('Judul wajib diisi','er');return}sL();try{if(act==='create'){await api({action:'createSubMateri',materi_id:CM.id,judul:j,konten:k,urutan:u});toast('Sub materi ditambahkan','ok')}else{await api({action:'updateSubMateri',id:id,judul:j,konten:k,urutan:u});toast('Sub materi diperbarui','ok')}selMateri(CM.id)}catch(e){toast(e.message,'er')}finally{hL()}}
function delSub(id){opCF('Hapus','Hapus sub materi ini?',async()=>{sL();try{await api({action:'deleteSubMateri',id:id});toast('Dihapus','ok');selMateri(CM.id)}catch(e){toast(e.message,'er')}finally{hL()}})}

function addSoal(){$('soalForm').innerHTML=soalForm('');qs('#soalForm .bt-p').onclick=()=>svSoal('create');qs('#soalForm .bt-o').onclick=()=>{$('soalForm').innerHTML=''}}
function edSoal(id){sL();api({action:'getMateriFull',materiId:CM.id}).then(r=>{const q=r.data.soal.find(x=>x.id===id);hL();if(q)$('soalForm').innerHTML=soalForm(q);qs('#soalForm .bt-p').onclick=()=>svSoal('update',id);qs('#soalForm .bt-o').onclick=()=>{$('soalForm').innerHTML=''}}).catch(e=>{hL();toast(e.message,'er')})}
function soalForm(q){return'<div class="cd fi" style="margin-top:10px"><div style="font-size:12px;font-weight:700;margin-bottom:8px">'+(q?'Edit':'Tambah')+' Soal</div><div class="fg1"><div class="fl"><label>Pertanyaan</label><textarea id="qfPertanyaan" style="height:70px">'+(q?q.pertanyaan:'')+'</textarea></div></div><div class="fg"><div class="fl"><label>Opsi A</label><input type="text" id="qfA" value="'+(q?q.opsiA:'')+'"></div><div class="fl"><label>Opsi B</label><input type="text" id="qfB" value="'+(q?q.opsiB:'')+'"></div></div><div class="fg"><div class="fl"><label>Opsi C</label><input type="text" id="qfC" value="'+(q?q.opsiC:'')+'"></div><div class="fl"><label>Opsi D</label><input type="text" id="qfD" value="'+(q?q.opsiD:'')+'"></div></div><div class="fg"><div class="fl"><label>Jawaban Benar</label><select id="qfJawaban"><option value="A"'+(q&&q.jawaban==='A'?' selected':'')+'>A</option><option value="B"'+(q&&q.jawaban==='B'?' selected':'')+'>B</option><option value="C"'+(q&&q.jawaban==='C'?' selected':'')+'>C</option><option value="D"'+(q&&q.jawaban==='D'?' selected':'')+'>D</option></select></div><div class="fl"><label>Skor</label><input type="number" id="qfSkor" value="'+(q?q.skor:'20')+'"></div></div><div class="fg1"><div class="fl"><label>Pembahasan</label><textarea id="qfPembahasan" style="height:50px">'+(q?q.pembahasan:'')+'</textarea></div></div><div style="display:flex;gap:5px"><button type="button" class="bt bt-p bt-sm"><i class="fas fa-save"></i> Simpan</button><button type="button" class="bt bt-o bt-sm">Batal</button></div></div>'}
async function svSoal(act,id){const p=$('qfPertanyaan').value.trim(),a=$('qfA').value,b=$('qfB').value,c=$('qfC').value,d=$('qfD').value,j=$('qfJawaban').value,sk=$('qfSkor').value,pb=$('qfPembahasan').value;if(!p){toast('Pertanyaan wajib diisi','er');return}sL();try{if(act==='create'){await api({action:'createSoal',materi_id:CM.id,pertanyaan:p,opsi_a:a,opsi_b:b,opsi_c:c,opsi_d:d,jawaban:j,skor:sk,pembahasan:pb});toast('Soal ditambahkan','ok')}else{await api({action:'updateSoal',id:id,pertanyaan:p,opsi_a:a,opsi_b:b,opsi_c:c,opsi_d:d,jawaban:j,skor:sk,pembahasan:pb});toast('Soal diperbarui','ok')}selMateri(CM.id)}catch(e){toast(e.message,'er')}finally{hL()}}
function delSoal(id){opCF('Hapus','Hapus soal ini?',async()=>{sL();try{await api({action:'deleteSoal',id:id});toast('Dihapus','ok');selMateri(CM.id)}catch(e){toast(e.message,'er')}finally{hL()}})}

function addLamp(){$('lampForm').innerHTML=lampForm('');qs('#lampForm .bt-p').onclick=()=>svLamp('create');qs('#lampForm .bt-o').onclick=()=>{$('lampForm').innerHTML=''}}
function edLamp(id){sL();api({action:'getMateriFull',materiId:CM.id}).then(r=>{const l=r.data.lampiran.find(x=>x.id===id);hL();if(l)$('lampForm').innerHTML=lampForm(l);qs('#lampForm .bt-p').onclick=()=>svLamp('update',id);qs('#lampForm .bt-o').onclick=()=>{$('lampForm').innerHTML=''}}).catch(e=>{hL();toast(e.message,'er')})}
function lampForm(l){return'<div class="cd fi" style="margin-top:10px"><div style="font-size:12px;font-weight:700;margin-bottom:8px">'+(l?'Edit':'Tambah')+' Lampiran</div><div class="fg"><div class="fl"><label>Jenis</label><select id="lfJenis"><option value="pdf"'+(l&&l.jenis==='pdf'?' selected':'')+'>PDF</option><option value="youtube"'+(l&&l.jenis==='youtube'?' selected':'')+'>YouTube</option><option value="link"'+(l&&l.jenis==='link'?' selected':'')+'>Link</option></select></div><div class="fl"><label>Urutan</label><input type="number" id="lfUrut" value="'+(l?l.urutan:'1')+'"></div></div><div class="fg1"><div class="fl"><label>Judul</label><input type="text" id="lfJudul" value="'+(l?l.judul:'')+'"></div></div><div class="fg1"><div class="fl"><label>URL</label><input type="text" id="lfUrl" value="'+(l?l.url:'')+'" placeholder="https://..."></div></div><div style="display:flex;gap:5px"><button type="button" class="bt bt-p bt-sm"><i class="fas fa-save"></i> Simpan</button><button type="button" class="bt bt-o bt-sm">Batal</button></div></div>'}
async function svLamp(act,id){const j=$('lfJenis').value,t=$('lfJudul').value.trim(),u=$('lfUrl').value.trim(),o=$('lfUrut').value;if(!t||!u){toast('Judul dan URL wajib diisi','er');return}sL();try{if(act==='create'){await api({action:'createLampiran',materi_id:CM.id,jenis:j,judul:t,url:u,urutan:o});toast('Lampiran ditambahkan','ok')}else{await api({action:'updateLampiran',id:id,jenis:j,judul:t,url:u,urutan:o});toast('Lampiran diperbarui','ok')}selMateri(CM.id)}catch(e){toast(e.message,'er')}finally{hL()}}
function delLamp(id){opCF('Hapus','Hapus lampiran ini?',async()=>{sL();try{await api({action:'deleteLampiran',id:id});toast('Dihapus','ok');selMateri(CM.id)}catch(e){toast(e.message,'er')}finally{hL()}})}
