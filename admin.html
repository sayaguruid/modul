<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Admin — Kelola Materi</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<style>
:root{--p:#0D7C66;--pd:#095C4B;--pdd:#063D33;--pl:#E6F5F1;--a:#D4942A;--al:#FFF7EB;--bg:#F0F4F8;--c:#FFF;--t:#1A2332;--t2:#4A5568;--tm:#8896A6;--b:#E2E8F0;--bl:#F1F5F9;--ok:#10B981;--okl:#ECFDF5;--wn:#F59E0B;--wnl:#FFFBEB;--er:#EF4444;--erl:#FEF2F2;--r:10px;--rs:7px;--tr:.2s ease}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--t);line-height:1.5;-webkit-tap-highlight-color:transparent}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select,textarea{font-family:inherit}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--b);border-radius:3px}

#TB{position:fixed;top:12px;right:12px;z-index:9999;display:flex;flex-direction:column;gap:5px;pointer-events:none}
.tt{padding:10px 14px;border-radius:var(--rs);font-size:11.5px;font-weight:600;color:#fff;box-shadow:0 4px 12px rgba(0,0,0,.12);animation:tIn .2s ease;pointer-events:auto;max-width:320px;word-break:break-word}
.tt.ok{background:var(--ok)}.tt.er{background:var(--er)}.tt.in{background:var(--p)}
@keyframes tIn{from{transform:translateX(100%);opacity:0}to{transform:none;opacity:1}}

#LD{position:fixed;inset:0;background:rgba(240,244,248,.75);z-index:9990;display:none;align-items:center;justify-content:center}
#LD.on{display:flex}
.sp{width:28px;height:28px;border:3px solid var(--b);border-top-color:var(--p);border-radius:50%;animation:spin .5s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.top{height:50px;background:var(--c);border-bottom:1px solid var(--b);display:flex;align-items:center;padding:0 12px;gap:8px;position:sticky;top:0;z-index:50}
.top .logo{color:var(--p);font-weight:800;font-size:15px;display:flex;align-items:center;gap:6px}
.top .sep{width:1px;height:24px;background:var(--b)}
.top .ttl{font-size:13px;font-weight:700}
.top .back{font-size:11px;color:var(--tm);cursor:pointer;transition:var(--tr);margin-left:auto;white-space:nowrap;padding:6px 10px;border-radius:var(--rs)}
.top .back:hover{color:var(--p);background:var(--bl)}
.ham{width:38px;height:38px;display:none;align-items:center;justify-content:center;border-radius:var(--rs);font-size:15px;color:var(--t2);flex-shrink:0}
.ham:active{background:var(--bl)}
.sbo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.25);z-index:99}
.sbo.on{display:block}

.wrap{display:flex;height:calc(100vh - 50px)}
.side{width:280px;background:var(--c);border-right:1px solid var(--b);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.side-hd{padding:10px 12px;border-bottom:1px solid var(--b);display:flex;align-items:center;gap:6px;flex-shrink:0}
.side-hd input{flex:1;height:36px;padding:0 10px;border:1px solid var(--b);border-radius:var(--rs);font-size:12px;outline:none}
.side-hd input:focus{border-color:var(--p)}
.side-add{padding:8px 12px;border-bottom:1px solid var(--b);flex-shrink:0}
.side-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}

.mi{padding:12px;border-bottom:1px solid var(--bl);cursor:pointer;transition:var(--tr);display:flex;gap:8px;align-items:flex-start}
.mi:hover{background:var(--pl)}
.mi.ac{background:var(--pl);border-left:3px solid var(--p)}
.mi-c{font-size:9px;font-weight:700;color:var(--p);letter-spacing:.2px;flex-shrink:0;margin-top:2px}
.mi-n{font-size:12px;font-weight:600;line-height:1.3}
.mi-k{font-size:9.5px;color:var(--tm);margin-top:1px}

.main{flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch}
.tabs{display:flex;gap:4px;margin-bottom:14px;flex-wrap:wrap}
.tab{padding:8px 14px;border-radius:var(--rs);font-size:11.5px;font-weight:600;color:var(--tm);background:var(--c);border:1px solid var(--b);transition:var(--tr);cursor:pointer;display:inline-flex;align-items:center}
.tab:hover{color:var(--p)}.tab.ac{color:#fff;background:var(--p);border-color:var(--p)}

.cd{background:var(--c);border-radius:var(--r);border:1px solid var(--b);padding:14px;margin-bottom:10px}
.stit{font-size:13px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:5px}
.stit i{color:var(--p);font-size:11px}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.fg1{display:grid;grid-template-columns:1fr;gap:8px;margin-bottom:10px}
.fl{display:flex;flex-direction:column;gap:3px}
.fl label{font-size:10.5px;font-weight:600;color:var(--t2)}
.fl input,.fl select,.fl textarea{height:40px;padding:0 10px;border:1.5px solid var(--b);border-radius:var(--rs);font-size:13px;outline:none;transition:var(--tr);width:100%}
.fl input:focus,.fl select:focus,.fl textarea:focus{border-color:var(--p)}
.fl textarea{height:80px;padding:8px 10px;resize:vertical}

.bt{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:9px 16px;border-radius:var(--rs);font-size:12px;font-weight:600;transition:var(--tr);min-height:38px}
.bt-p{background:var(--p);color:#fff}.bt-p:hover{background:var(--pd)}
.bt-o{border:1.5px solid var(--b);color:var(--t2)}.bt-o:hover{border-color:var(--p);color:var(--p)}
.bt-d{background:var(--er);color:#fff}
.bt-a{background:var(--a);color:#fff}
.bt-sm{padding:6px 10px;font-size:11px;min-height:34px}

.item-row{display:flex;align-items:center;gap:10px;padding:12px;border:1px solid var(--b);border-radius:var(--rs);margin-bottom:6px;background:var(--c);transition:var(--tr)}
.item-row:hover{border-color:var(--p)}
.item-info{flex:1;min-width:0}
.item-title{font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.item-sub{font-size:10px;color:var(--tm)}
.item-badge{font-size:9px;font-weight:600;padding:2px 7px;border-radius:10px;text-transform:uppercase;letter-spacing:.3px;flex-shrink:0}
.item-badge.pdf{background:#FEE2E2;color:#DC2626}
.item-badge.youtube{background:#FEE2E2;color:#FF0000}
.item-badge.link{background:var(--al);color:var(--a)}
.emp{text-align:center;padding:30px;color:var(--tm);font-size:12px}

.mo{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:200;display:none;align-items:center;justify-content:center;padding:16px}
.mo.on{display:flex}
.md{background:var(--c);border-radius:var(--r);box-shadow:0 6px 16px rgba(0,0,0,.08);max-width:320px;width:100%;padding:18px}
.md h3{font-size:14px;font-weight:700;margin-bottom:4px}
.md p{font-size:11.5px;color:var(--t2);margin-bottom:12px;line-height:1.4}
.md-a{display:flex;gap:6px;justify-content:flex-end}

#dbg{position:fixed;bottom:0;left:0;right:0;background:#1a1a2e;color:#0f0;padding:6px 12px;font-size:10px;font-family:monospace;z-index:9998;display:none;max-height:60px;overflow-y:auto;word-break:break-all}
#dbg.on{display:block}#dbg .ok{color:#10B981}#dbg .er{color:#EF4444}#dbg .in{color:#60A5FA}

.fi{animation:fadeUp .2s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

/* === RICH TEXT EDITOR === */
.ed-wrap{margin-bottom:10px}
.ed-toolbar{display:flex;gap:2px;padding:6px;border:1.5px solid var(--b);border-bottom:none;border-radius:var(--rs) var(--rs) 0 0;background:var(--bl);flex-wrap:wrap;align-items:center}
.ed-toolbar button{width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:5px;font-size:12px;color:var(--t2);transition:var(--tr);flex-shrink:0}
.ed-toolbar button:hover{background:var(--c);color:var(--p)}
.ed-toolbar button:active{background:var(--pl)}
.ed-toolbar button.active{background:var(--pl);color:var(--p)}
.ed-sep{width:1px;height:20px;background:var(--b);margin:0 4px;flex-shrink:0}
.ed-body{border:1.5px solid var(--b);border-top:none;border-radius:0 0 var(--rs) var(--rs);padding:12px;font-size:13px;line-height:1.7;outline:none;overflow-y:auto;min-height:140px;max-height:320px;-webkit-overflow-scrolling:touch;background:var(--c);color:var(--t)}
.ed-body:focus{border-color:var(--p)}
.ed-body:empty::before{content:attr(data-placeholder);color:var(--tm);pointer-events:none}
.ed-body ul,.ed-body ol{padding-left:20px;margin:4px 0}.ed-body li{margin-bottom:3px}
.ed-body h2{font-size:16px;font-weight:700;margin:10px 0 4px;color:var(--t)}
.ed-body h3{font-size:14px;font-weight:700;margin:8px 0 3px;color:var(--t)}
.ed-body p{margin-bottom:4px}
.ed-body strong,.ed-body b{color:var(--t)}
.ed-raw{display:none;border:1.5px solid var(--b);border-top:1px dashed var(--a);border-radius:0 0 var(--rs) var(--rs);padding:10px;font-size:11px;font-family:'Courier New',monospace;line-height:1.5;min-height:140px;max-height:320px;overflow-y:auto;resize:vertical;background:#1a1a2e;color:#0f0;outline:none}
.ed-raw:focus{border-color:var(--a)}
.ed-hint{font-size:10px;color:var(--tm);margin-top:4px;font-style:italic}

@media(max-width:768px){
.side{position:fixed;top:50px;left:0;bottom:0;width:280px;transform:translateX(-100%);transition:transform .25s ease;z-index:100;border-right:1px solid var(--b)}
.side.op{transform:translateX(0)}
.main{margin-left:0}.ham{display:flex}.fg{grid-template-columns:1fr}
.top .back{display:none}.tabs{gap:3px}.tab{padding:6px 10px;font-size:10.5px}
.ed-toolbar button{width:36px;height:36px;font-size:13px}
}
</style>
</head>
<body>
<div id="TB"></div><div id="LD"><div class="sp"></div></div><div id="dbg"></div>

<div class="top">
<button class="ham" id="hamA"><i class="fas fa-bars"></i></button>
<span class="logo"><i class="fas fa-flask"></i> e-Lab</span>
<span class="sep"></span><span class="ttl">Admin Panel</span>
<span class="back" onclick="window.open('index.html','_blank')"><i class="fas fa-external-link-alt"></i> Buka Aplikasi</span>
</div>

<div class="sbo" id="sbo"></div>
<div class="wrap">
<div class="side" id="sideA">
<div class="side-hd"><i class="fas fa-search" style="color:var(--tm);font-size:12px"></i><input type="text" id="srcInp" placeholder="Cari materi..."></div>
<div class="side-add"><button class="bt bt-a" style="width:100%" id="btnAddM"><i class="fas fa-plus"></i> Tambah Materi Baru</button></div>
<div class="side-list" id="mList"></div>
</div>
<div class="main" id="mPanel"><div class="emp"><i class="fas fa-arrow-left" style="font-size:24px;display:block;margin-bottom:8px;opacity:.3"></i>Pilih materi di sidebar untuk mulai mengelola</div></div>
</div>

<div class="mo" id="CFM"><div class="md"><h3 id="cft"></h3><p id="cfm"></p><div class="md-a"><button class="bt bt-o" onclick="clCF()">Batal</button><button class="bt bt-d" id="cfok">Ya</button></div></div></div>

<script>
const API='https://script.google.com/macros/s/AKfycbwsagEj_jWjmv_RwH-jkgOrT5YZ0bk1KdDf7iGrJGFOTu5C0wxvmYnxpvlxxaF_Mwih/exec';
let ML=[],CM=null,CTAB='info',CD=null,_isHtmlMode=false;
const $=id=>document.getElementById(id);const qs=(s,c)=>(c||document).querySelector(s);const qa=(s,c)=>(c||document).querySelectorAll(s);

function dbg(msg,t){console.log((t==='er'?'[ERR] ':'[OK] ')+msg);const d=$('dbg');if(!d)return;const s=document.createElement('div');s.className=t||'in';s.textContent='['+new Date().toLocaleTimeString()+'] '+msg;d.appendChild(s);d.scrollTop=d.scrollHeight}
function toast(m,t){const d=document.createElement('div');d.className='tt '+(t||'in');d.textContent=m;$('TB').appendChild(d);setTimeout(()=>{d.style.opacity='0';setTimeout(()=>d.remove(),200)},2500)}
function sL(){$('LD').classList.add('on')}function hL(){$('LD').classList.remove('on')}

function api(p){return new Promise((resolve,reject)=>{const cbName='_cb_'+Date.now()+'_'+Math.random().toString(36).substr(2,4),script=document.createElement('script');let url=API+'?callback='+cbName;for(let k in p)url+='&'+encodeURIComponent(k)+'='+encodeURIComponent(p[k]);dbg('REQ: '+p.action);const timer=setTimeout(()=>{cleanup();reject({message:'Timeout (20s)'})},20000);function cleanup(){clearTimeout(timer);delete window[cbName];if(script.parentNode)script.parentNode.removeChild(script)}window[cbName]=function(data){cleanup();if(data&&data.success){dbg('OK: '+p.action,'ok');resolve(data)}else{const msg=(data&&data.message)||'Response tidak valid';dbg('FAIL: '+msg,'er');reject({message:msg})}};script.onerror=function(){cleanup();reject({message:'Gagal terhubung ke server'})};script.src=url;document.head.appendChild(script)})}

function openSide(){$('sideA').classList.add('op');$('sbo').classList.add('on')}
function closeSide(){$('sideA').classList.remove('op');$('sbo').classList.remove('on')}
 $('hamA').onclick=openSide;$('sbo').onclick=closeSide;

let _cfCb=null;function opCF(t,m,cb){$('cft').textContent=t;$('cfm').textContent=m;_cfCb=cb;$('CFM').classList.add('on')}function clCF(){$('CFM').classList.remove('on');_cfCb=null}$('cfok').onclick=()=>{if(_cfCb)_cfCb();clCF()};

/* ===== LOAD LIST ===== */
async function loadMList(){sL();try{const r=await api({action:'getAllMateri'});if(!r.data||!Array.isArray(r.data)){dbg('Data bukan array','er');toast('Format data tidak valid','er');return}ML=r.data;dbg(ML.length+' materi loaded','ok');rML()}catch(e){dbg(e.message,'er');toast(e.message,'er')}finally{hL()}}

function rML(filter){const el=$('mList');let list=ML;if(filter)list=ML.filter(m=>(m.nama+' '+m.kode+' '+(m.kategori||'')).toLowerCase().indexOf(filter.toLowerCase())>=0);if(!list.length){el.innerHTML='<div class="emp" style="padding:20px"><i class="fas fa-inbox" style="font-size:20px;display:block;margin-bottom:6px;opacity:.3"></i>'+(filter?'Tidak ditemukan':'Belum ada materi')+'</div>';return}el.innerHTML=list.map(m=>'<div class="mi'+(CM&&CM.id===m.id?' ac':'')+'" data-id="'+m.id+'"><div style="flex:1;min-width:0"><div class="mi-c">'+(m.kode||'-')+'</div><div class="mi-n">'+(m.nama||'-')+'</div><div class="mi-k">'+(m.kategori||'-')+'</div></div></div>').join('');qa('.mi',el).forEach(item=>{item.onclick=()=>{selMateri(item.dataset.id);closeSide()}})}
 $('srcInp').oninput=e=>rML(e.target.value);

/* ===== NAVIGATION HELPERS ===== */
 $('btnAddM').onclick=()=>{closeSide();CM=null;CD=null;CTAB='info';rML();showAddForm()};
function backToList(){CM=null;CD=null;$('mPanel').innerHTML='<div class="emp"><i class="fas fa-arrow-left" style="font-size:24px;display:block;margin-bottom:8px;opacity:.3"></i>Pilih materi di sidebar untuk mulai mengelola</div>'}

function showAddForm(){const el=$('mPanel');el.innerHTML='<div class="fi"><div style="display:flex;align-items:center;gap:8px;margin-bottom:14px"><button class="bt bt-o bt-sm" id="backToList"><i class="fas fa-arrow-left"></i></button><span style="font-size:15px;font-weight:800"><i class="fas fa-plus-circle" style="color:var(--a)"></i> Tambah Materi Baru</span></div>'+buildInfoForm({kode:'',nama:'',deskripsi:'',targetSkor:100,urutan:ML.length+1,kategori:'Lainnya'},true)+'</div>';$('backToList').onclick=backToList;bindFormButtons()}

/* ===== PILIH MATERI ===== */
async function selMateri(id){sL();try{const r=await api({action:'getMateriFull',materiId:id});CD=r.data;CM=r.data.materi;CTAB='info';rML();renderPanel(r.data)}catch(e){dbg(e.message,'er');toast(e.message,'er')}finally{hL()}}

/* ===== RENDER PANEL ===== */
function renderPanel(d){const el=$('mPanel'),m=d.materi;el.innerHTML='<div class="fi"><div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap"><button class="bt bt-o bt-sm" id="backToList"><i class="fas fa-arrow-left"></i></button><span style="font-size:10px;font-weight:700;color:var(--p)">'+m.kode+'</span><span style="font-size:15px;font-weight:800">'+m.nama+'</span></div><div class="tabs"><div class="tab'+(CTAB==='info'?' ac':'')+'" data-t="info"><i class="fas fa-info-circle"></i> Info</div><div class="tab'+(CTAB==='sub'?' ac':'')+'" data-t="sub"><i class="fas fa-book"></i> Sub ('+d.submateri.length+')</div><div class="tab'+(CTAB==='soal'?' ac':'')+'" data-t="soal"><i class="fas fa-pen-to-square"></i> Soal ('+d.soal.length+')</div><div class="tab'+(CTAB==='lamp'?' ac':'')+'" data-t="lamp"><i class="fas fa-paperclip"></i> Lamp ('+d.lampiran.length+')</div></div><div id="tabC"></div></div>';$('backToList').onclick=backToList;qa('.tab',el).forEach(t=>t.onclick=()=>{CTAB=t.dataset.t;renderPanel(d)});const tc=$('tabC');if(CTAB==='info')tc.innerHTML=buildInfoForm(m,false);else if(CTAB==='sub')tc.innerHTML=buildSubList(d.submateri);else if(CTAB==='soal')tc.innerHTML=buildSoalList(d.soal);else tc.innerHTML=buildLampList(d.lampiran);bindFormButtons()}

/* ===== BUILD FORMS ===== */
function buildInfoForm(m,isNew){return '<div class="cd"><div class="stit"><i class="fas fa-edit"></i> '+(isNew?'Tambah':'Edit')+' Materi</div><div class="fg"><div class="fl"><label>Kode</label><input type="text" id="fKode" value="'+(m.kode||'')+'" placeholder="UK.1.KK.01"></div><div class="fl"><label>Kategori</label><input type="text" id="fKat" value="'+(m.kategori||'')+'" placeholder="Lainnya"></div></div><div class="fg1"><div class="fl"><label>Nama Unit Kompetensi</label><input type="text" id="fNama" value="'+(m.nama||'')+'" placeholder="Nama materi"></div></div><div class="fg1"><div class="fl"><label>Deskripsi</label><textarea id="fDesk" placeholder="Deskripsi materi">'+(m.deskripsi||'')+'</textarea></div></div><div class="fg"><div class="fl"><label>Target Skor</label><input type="number" id="fTarget" value="'+(m.targetSkor||100)+'"></div><div class="fl"><label>Urutan</label><input type="number" id="fUrut" value="'+(m.urutan||1)+'"></div></div><div style="display:flex;gap:6px;margin-top:8px"><button type="button" class="bt bt-p" id="btnSvM"><i class="fas fa-save"></i> '+(isNew?'Tambah Materi':'Simpan')+'</button>'+(isNew?'':'<button type="button" class="bt bt-d" id="btnDelM"><i class="fas fa-trash"></i> Hapus</button>')+'</div></div>'}

function buildSubList(list){let items='';list.forEach(s=>{items+='<div class="item-row"><div class="item-info"><div class="item-title">'+s.judul+'</div><div class="item-sub">Urutan: '+s.urutan+'</div></div><div style="display:flex;gap:4px"><button class="bt bt-sm bt-o" data-act="edSub" data-id="'+s.id+'"><i class="fas fa-edit"></i></button><button class="bt bt-sm bt-d" data-act="delSub" data-id="'+s.id+'"><i class="fas fa-trash"></i></button></div></div>'});return '<div style="display:flex;justify-content:flex-end;margin-bottom:10px"><button class="bt bt-p bt-sm" data-act="addSub"><i class="fas fa-plus"></i> Tambah Sub Materi</button></div>'+(items||'<div class="emp">Belum ada sub materi</div>')+'<div id="subForm"></div>'}

function buildSoalList(list){let items='';list.forEach((q,i)=>{items+='<div class="item-row"><div class="item-info"><div class="item-title">Soal '+(i+1)+' — <b>'+q.jawaban+'</b> ('+q.skor+' poin)</div><div class="item-sub" style="white-space:normal;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">'+q.pertanyaan+'</div></div><div style="display:flex;gap:4px;flex-shrink:0"><button class="bt bt-sm bt-o" data-act="edSoal" data-id="'+q.id+'"><i class="fas fa-edit"></i></button><button class="bt bt-sm bt-d" data-act="delSoal" data-id="'+q.id+'"><i class="fas fa-trash"></i></button></div></div>'});return '<div style="display:flex;justify-content:flex-end;margin-bottom:10px"><button class="bt bt-p bt-sm" data-act="addSoal"><i class="fas fa-plus"></i> Tambah Soal</button></div>'+(items||'<div class="emp">Belum ada soal</div>')+'<div id="soalForm"></div>'}

function buildLampList(list){let items='';list.forEach(l=>{items+='<div class="item-row"><div class="item-info"><div class="item-title">'+l.judul+'</div><div class="item-sub">'+l.url+'</div></div><span class="item-badge '+l.jenis+'">'+l.jenis+'</span><div style="display:flex;gap:4px;flex-shrink:0"><button class="bt bt-sm bt-o" data-act="edLamp" data-id="'+l.id+'"><i class="fas fa-edit"></i></button><button class="bt bt-sm bt-d" data-act="delLamp" data-id="'+l.id+'"><i class="fas fa-trash"></i></button></div></div>'});return '<div style="display:flex;justify-content:flex-end;margin-bottom:10px"><button class="bt bt-p bt-sm" data-act="addLamp"><i class="fas fa-plus"></i> Tambah Lampiran</button></div>'+(items||'<div class="emp">Belum ada lampiran</div>')+'<div id="lampForm"></div>'}

/* ===== BIND BUTTONS ===== */
function bindFormButtons(){
  const svM=$('btnSvM');if(svM)svM.onclick=()=>svMateri();
  const delM=$('btnDelM');if(delM)delM.onclick=()=>delMateri();
  qa('[data-act]').forEach(btn=>{
    const act=btn.dataset.act,id=btn.dataset.id;
    if(act==='addSub')btn.onclick=()=>showSubForm();
    else if(act==='edSub')btn.onclick=()=>showSubForm(id);
    else if(act==='delSub')btn.onclick=()=>delSub(id);
    else if(act==='addSoal')btn.onclick=()=>showSoalForm();
    else if(act==='edSoal')btn.onclick=()=>showSoalForm(id);
    else if(act==='delSoal')btn.onclick=()=>delSoal(id);
    else if(act==='addLamp')btn.onclick=()=>showLampForm();
    else if(act==='edLamp')btn.onclick=()=>showLampForm(id);
    else if(act==='delLamp')btn.onclick=()=>delLamp(id);
  });
}

/* ===== CRUD MATERI ===== */
async function svMateri(){const k=$('fKode').value.trim(),n=$('fNama').value.trim(),d=$('fDesk').value,t=$('fTarget').value,u=$('fUrut').value,ka=$('fKat').value;if(!n){toast('Nama wajib diisi','er');return}if(!k){toast('Kode wajib diisi','er');return}sL();try{if(CM){await api({action:'updateMateri',id:CM.id,kode:k,nama:n,deskripsi:d,target_skor:t,urutan:u,kategori:ka});toast('Materi disimpan','ok');selMateri(CM.id)}else{const r=await api({action:'createMateri',kode:k,nama:n,deskripsi:d,target_skor:t,urutan:u,kategori:ka});toast('Materi ditambahkan','ok');await loadMList();if(r.data&&r.data.id)selMateri(r.data.id);else backToList()}}catch(e){toast(e.message||'Gagal','er')}finally{hL()}}

function delMateri(){if(!CM)return;opCF('Hapus Materi','SEMUA sub-materi, soal, lampiran, dan nilai akan dihapus permanen!',async()=>{sL();try{await api({action:'deleteMateri',id:CM.id});toast('Materi dihapus','ok');CM=null;CD=null;await loadMList();backToList()}catch(e){toast(e.message||'Gagal','er')}finally{hL()}})}

/* ========== RICH TEXT EDITOR ========== */
function edCmd(cmd,val){document.execCommand(cmd,false,val||null);$('edBody').focus()}
function getEdHtml(){return _isHtmlMode?($('edRaw')?$('edRaw').value:''):$('edBody')?$('edBody').innerHTML:''}
function setEdHtml(html){_isHtmlMode=false;if($('edBody'))$('edBody').innerHTML=html||'';if($('edRaw'))$('edRaw').value=html||'';if($('edRaw'))$('edRaw').style.display='none';if($('edBody'))$('edBody').style.display='block';if($('edHtmlBtn'))$('edHtmlBtn').classList.remove('active')}
function toggleHtml(){_isHtmlMode=!_isHtmlMode;if(_isHtmlMode){if($('edBody'))$('edBody').style.display='none';if($('edRaw')){$('edRaw').value=$('edBody')?$('edBody').innerHTML:'';$('edRaw').style.display='block'}if($('edHtmlBtn'))$('edHtmlBtn').classList.add('active')}else{const html=$('edRaw')?$('edRaw').value:'';if($('edBody'))$('edBody').innerHTML=html;if($('edBody'))$('edBody').style.display='block';if($('edRaw'))$('edRaw').style.display='none';if($('edHtmlBtn'))$('edHtmlBtn').classList.remove('active')}}

function buildEditor(initialHtml){
  _isHtmlMode=false;let clean=initialHtml||'';if(clean==='<br>'||clean==='<div><br></div>')clean='';
  return '<div class="ed-wrap">'+
    '<div class="ed-toolbar">'+
      '<button type="button" onclick="edCmd(\'bold\')" title="Tebal (Ctrl+B)"><i class="fas fa-bold"></i></button>'+
      '<button type="button" onclick="edCmd(\'italic\')" title="Miring (Ctrl+I)"><i class="fas fa-italic"></i></button>'+
      '<button type="button" onclick="edCmd(\'underline\')" title="Garis bawah (Ctrl+U)"><i class="fas fa-underline"></i></button>'+
      '<span class="ed-sep"></span>'+
      '<button type="button" onclick="edCmd(\'formatBlock\',\'H2\')" title="Judul Besar"><i class="fas fa-heading"></i></button>'+
      '<button type="button" onclick="edCmd(\'formatBlock\',\'H3\')" title="Judul Kecil" style="font-size:11px;font-weight:700">H3</button>'+
      '<button type="button" onclick="edCmd(\'formatBlock\',\'P\')" title="Paragraf" style="font-size:10px">P</button>'+
      '<span class="ed-sep"></span>'+
      '<button type="button" onclick="edCmd(\'insertUnorderedList\')" title="Daftar Bullet"><i class="fas fa-list-ul"></i></button>'+
      '<button type="button" onclick="edCmd(\'insertOrderedList\')" title="Daftar Angka"><i class="fas fa-list-ol"></i></button>'+
      '<span class="ed-sep"></span>'+
      '<button type="button" onclick="edCmd(\'removeFormat\')" title="Hapus Format"><i class="fas fa-eraser"></i></button>'+
      '<button type="button" id="edHtmlBtn" onclick="toggleHtml()" title="Mode HTML"><i class="fas fa-code"></i></button>'+
    '</div>'+
    '<div class="ed-body" id="edBody" contenteditable="true" data-placeholder="Ketik konten materi di sini...">'+clean+'</div>'+
    '<textarea class="ed-raw" id="edRaw" placeholder="HTML mentah..."></textarea>'+
    '<div class="ed-hint"><i class="fas fa-lightbulb"></i> Gunakan toolbar untuk format teks. Klik <i class="fas fa-code"></i> untuk edit HTML langsung jika diperlukan.</div>'+
  '</div>';
}

/* ===== CRUD SUB MATERI ===== */
function showSubForm(editId){let data=null;if(editId&&CD){data=CD.submateri.find(x=>x.id===editId);if(!data){toast('Data tidak ditemukan','er');return}}const isEdit=!!data;$('subForm').innerHTML='<div class="cd fi" style="margin-top:10px"><div class="stit"><i class="fas fa-book"></i> '+(isEdit?'Edit':'Tambah')+' Sub Materi</div><div class="fg1"><div class="fl"><label>Judul</label><input type="text" id="sfJudul" value="'+(data?data.judul:'')+'"></div></div><div class="fg"><div class="fl"><label>Urutan</label><input type="number" id="sfUrut" value="'+(data?data.urutan:1)+'"></div></div>'+buildEditor(data?data.konten:'')+'<div style="display:flex;gap:5px;margin-top:8px"><button type="button" class="bt bt-p bt-sm" id="sfSave"><i class="fas fa-save"></i> Simpan</button><button type="button" class="bt bt-o bt-sm" id="sfCancel">Batal</button></div></div>';$('sfSave').onclick=async()=>{const j=$('sfJudul').value.trim(),k=getEdHtml(),u=$('sfUrut').value;if(!j){toast('Judul wajib diisi','er');return}sL();try{if(isEdit){await api({action:'updateSubMateri',id:editId,judul:j,konten:k,urutan:u});toast('Sub materi diperbarui','ok')}else{await api({action:'createSubMateri',materi_id:CM.id,judul:j,konten:k,urutan:u});toast('Sub materi ditambahkan','ok')}selMateri(CM.id)}catch(e){toast(e.message||'Gagal','er')}finally{hL()}};$('sfCancel').onclick=()=>{$('subForm').innerHTML=''}}

function delSub(id){opCF('Hapus','Hapus sub materi ini?',async()=>{sL();try{await api({action:'deleteSubMateri',id:id});toast('Dihapus','ok');selMateri(CM.id)}catch(e){toast(e.message||'Gagal','er')}finally{hL()}})}

/* ===== CRUD SOAL ===== */
function showSoalForm(editId){let data=null;if(editId&&CD){data=CD.soal.find(x=>x.id===editId);if(!data){toast('Data tidak ditemukan','er');return}}const isEdit=!!data;const q=data||{};$('soalForm').innerHTML='<div class="cd fi" style="margin-top:10px"><div class="stit"><i class="fas fa-pen-to-square"></i> '+(isEdit?'Edit':'Tambah')+' Soal</div><div class="fg1"><div class="fl"><label>Pertanyaan</label><textarea id="qfP" style="height:70px;padding:8px 10px;border:1.5px solid var(--b);border-radius:var(--rs);font-size:13px;outline:none;resize:vertical">'+(q.pertanyaan||'')+'</textarea></div></div><div class="fg"><div class="fl"><label>Opsi A</label><input type="text" id="qfA" value="'+(q.opsiA||'')+'"></div><div class="fl"><label>Opsi B</label><input type="text" id="qfB" value="'+(q.opsiB||'')+'"></div></div><div class="fg"><div class="fl"><label>Opsi C</label><input type="text" id="qfC" value="'+(q.opsiC||'')+'"></div><div class="fl"><label>Opsi D</label><input type="text" id="qfD" value="'+(q.opsiD||'')+'"></div></div><div class="fg"><div class="fl"><label>Jawaban</label><select id="qfJ"><option value="A"'+(q.jawaban==='A'?' selected':'')+'>A</option><option value="B"'+(q.jawaban==='B'?' selected':'')+'>B</option><option value="C"'+(q.jawaban==='C'?' selected':'')+'>C</option><option value="D"'+(q.jawaban==='D'?' selected':'')+'>D</option></select></div><div class="fl"><label>Skor</label><input type="number" id="qfSk" value="'+(q.skor||20)+'"></div></div><div class="fg1"><div class="fl"><label>Pembahasan</label><textarea id="qfPb" style="height:50px;padding:8px 10px;border:1.5px solid var(--b);border-radius:var(--rs);font-size:13px;outline:none;resize:vertical">'+(q.pembahasan||'')+'</textarea></div></div><div style="display:flex;gap:5px"><button type="button" class="bt bt-p bt-sm" id="qfSave"><i class="fas fa-save"></i> Simpan</button><button type="button" class="bt bt-o bt-sm" id="qfCancel">Batal</button></div></div>';$('qfSave').onclick=async()=>{const p=$('qfP').value.trim(),a=$('qfA').value,b=$('qfB').value,c=$('qfC').value,d=$('qfD').value,j=$('qfJ').value,sk=$('qfSk').value,pb=$('qfPb').value;if(!p){toast('Pertanyaan wajib diisi','er');return}sL();try{if(isEdit){await api({action:'updateSoal',id:editId,pertanyaan:p,opsi_a:a,opsi_b:b,opsi_c:c,opsi_d:d,jawaban:j,skor:sk,pembahasan:pb});toast('Soal diperbarui','ok')}else{await api({action:'createSoal',materi_id:CM.id,pertanyaan:p,opsi_a:a,opsi_b:b,opsi_c:c,opsi_d:d,jawaban:j,skor:sk,pembahasan:pb});toast('Soal ditambahkan','ok')}selMateri(CM.id)}catch(e){toast(e.message||'Gagal','er')}finally{hL()}};$('qfCancel').onclick=()=>{$('soalForm').innerHTML=''}}

function delSoal(id){opCF('Hapus','Hapus soal ini?',async()=>{sL();try{await api({action:'deleteSoal',id:id});toast('Dihapus','ok');selMateri(CM.id)}catch(e){toast(e.message||'Gagal','er')}finally{hL()}})}

/* ===== CRUD LAMPIRAN ===== */
function showLampForm(editId){let data=null;if(editId&&CD){data=CD.lampiran.find(x=>x.id===editId);if(!data){toast('Data tidak ditemukan','er');return}}const isEdit=!!data;const l=data||{};$('lampForm').innerHTML='<div class="cd fi" style="margin-top:10px"><div class="stit"><i class="fas fa-paperclip"></i> '+(isEdit?'Edit':'Tambah')+' Lampiran</div><div class="fg"><div class="fl"><label>Jenis</label><select id="lfJ"><option value="pdf"'+(l.jenis==='pdf'?' selected':'')+'>PDF</option><option value="youtube"'+(l.jenis==='youtube'?' selected':'')+'>YouTube</option><option value="link"'+(l.jenis==='link'?' selected':'')+'>Link</option></select></div><div class="fl"><label>Urutan</label><input type="number" id="lfUrut" value="'+(l.urutan||1)+'"></div></div><div class="fg1"><div class="fl"><label>Judul</label><input type="text" id="lfJudul" value="'+(l.judul||'')+'"></div></div><div class="fg1"><div class="fl"><label>URL</label><input type="text" id="lfUrl" value="'+(l.url||'')+'" placeholder="https://..."></div></div><div style="display:flex;gap:5px"><button type="button" class="bt bt-p bt-sm" id="lfSave"><i class="fas fa-save"></i> Simpan</button><button type="button" class="bt bt-o bt-sm" id="lfCancel">Batal</button></div></div>';$('lfSave').onclick=async()=>{const j=$('lfJ').value,t=$('lfJudul').value.trim(),u=$('lfUrl').value.trim(),o=$('lfUrut').value;if(!t||!u){toast('Judul dan URL wajib diisi','er');return}sL();try{if(isEdit){await api({action:'updateLampiran',id:editId,jenis:j,judul:t,url:u,urutan:o});toast('Lampiran diperbarui','ok')}else{await api({action:'createLampiran',materi_id:CM.id,jenis:j,judul:t,url:u,urutan:o});toast('Lampiran ditambahkan','ok')}selMateri(CM.id)}catch(e){toast(e.message||'Gagal','er')}finally{hL()}};$('lfCancel').onclick=()=>{$('lampForm').innerHTML=''}}

function delLamp(id){opCF('Hapus','Hapus lampiran ini?',async()=>{sL();try{await api({action:'deleteLampiran',id:id});toast('Dihapus','ok');selMateri(CM.id)}catch(e){toast(e.message||'Gagal','er')}finally{hL()}})}

loadMList();
</script>
