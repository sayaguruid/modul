const API='https://script.google.com/macros/s/AKfycbwsagEj_jWjmv_RwH-jkgOrT5YZ0bk1KdDf7iGrJGFOTu5C0wxvmYnxpvlxxaF_Mwih/exec';
let CU=null,MC=[],CM=null,SQ=[],JW={},QI=0,QS=false,CC='Semua';
const $=id=>document.getElementById(id);const qs=(s,c)=>(c||document).querySelector(s);const qa=(s,c)=>(c||document).querySelectorAll(s);
function toast(m,t){const d=document.createElement('div');d.className='tt '+(t||'in');d.textContent=m;$('TB').appendChild(d);setTimeout(()=>{d.style.opacity='0';setTimeout(()=>d.remove(),200)},2200)}
function sL(){$('LD').classList.add('on')}function hL(){$('LD').classList.remove('on')}
function ini(n){return n.split(' ').map(w=>w[0]).join('').substr(0,2).toUpperCase()}
function sB(s){return s==='lulus'?'cok':s==='belum_lulus'?'cfl':''}
function sBd(s){return s==='lulus'?'<span class="bg bg-ok"><i class="fas fa-check"></i> Lulus</span>':s==='belum_lulus'?'<span class="bg bg-er"><i class="fas fa-xmark"></i> Belum</span>':'<span class="bg bg-mt"><i class="fas fa-minus"></i> Belum</span>'}
function fDt(t){if(!t)return'-';try{return new Date(t).toLocaleDateString('id-ID',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'})}catch(e){return t}}
function api(p){return new Promise((ok,no)=>{const c='_c'+Date.now()+Math.random().toString(36).substr(2,3),s=document.createElement('script');let u=API+'?callback='+c;for(let k in p)u+='&'+encodeURIComponent(k)+'='+encodeURIComponent(p[k]);window[c]=d=>{delete window[c];if(s.parentNode)s.parentNode.removeChild(s);d.success?ok(d):no(d)};s.onerror=()=>{delete window[c];if(s.parentNode)s.parentNode.removeChild(s);no({message:'Gagal terhubung ke server'})};s.src=u;document.head.appendChild(s);setTimeout(()=>{if(window[c]){delete window[c];if(s.parentNode)s.parentNode.removeChild(s);no({message:'Timeout'})}},20000)})}
function ringH(p,sz,sw,cl){sz=sz||110;sw=sw||7;const r=(sz/2)-sw,c=2*Math.PI*Math.max(1,r),o=c-(p/100)*c;return'<div class="ring" style="width:'+sz+'px;height:'+sz+'px"><svg width="'+sz+'" height="'+sz+'"><circle class="rbg" cx="'+sz/2+'" cy="'+sz/2+'" r="'+r+'" stroke-width="'+sw+'"/><circle class="rfg" cx="'+sz/2+'" cy="'+sz/2+'" r="'+r+'" stroke-width="'+sw+'" stroke="'+(cl||'var(--p)')+'" stroke-dasharray="'+c+'" stroke-dashoffset="'+o+'"/></svg><div class="rl"><span class="rv" style="font-size:'+(sz*.18)+'px">'+p+'%</span><span class="rt">selesai</span></div></div>'}
let mCb=null;function opCF(t,m,cb){$('cft').textContent=t;$('cfm').textContent=m;mCb=cb;$('CFM').classList.add('on')}function clCF(){$('CFM').classList.remove('on');mCb=null}$('cfok').onclick=()=>{if(mCb)mCb();clCF()};
function ytId(u){const m=u.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([a-zA-Z0-9_-]{11})/);return m?m[1]:null}
function opMM(url,jenis,judul){if(jenis==='youtube'){const v=ytId(url);if(v){$('MMf').src='https://www.youtube.com/embed/'+v+'?rel=0';$('MMt').textContent=judul||'Video';$('MM').classList.add('on');return}}if(jenis==='pdf'){$('MMf').src=url.replace(/\/view$/,'/preview');$('MMt').textContent=judul||'Dokumen';$('MM').classList.add('on');return}window.open(url,'_blank')}
function clMM(){$('MMf').src='';$('MM').classList.remove('on')}
 $('MM').onclick=e=>{if(e.target===$('MM'))clMM()};document.onkeydown=e=>{if(e.key==='Escape')clMM()};
async function doLogin(){const u=$('iu').value.trim(),p=$('ip').value.trim();if(!u||!p){$('le').textContent='Isi username dan password';return}$('le').textContent='';$('bl').disabled=true;try{sL();const r=await api({action:'login',username:u,password:p});CU=r.data;localStorage.setItem('lab_a',JSON.stringify({u,p,...CU}));toast('Selamat datang, '+CU.nama,'ok');CU.role==='Siswa'?showS():showG()}catch(e){$('le').textContent=e.message||'Gagal'}finally{hL();$('bl').disabled=false}}
function doOut(){localStorage.removeItem('lab_a');CU=null;MC=[];$('PS').classList.remove('on');$('PG').classList.remove('on');$('PL').style.display='flex';$('iu').value='';$('ip').value='';$('le').textContent=''}
 $('bl').onclick=doLogin;$('ip').onkeydown=e=>{if(e.key==='Enter')doLogin()};$('iu').onkeydown=e=>{if(e.key==='Enter')$('ip').focus()};
async function init(){const s=localStorage.getItem('lab_a');if(s){try{const a=JSON.parse(s);$('iu').value=a.u;$('ip').value=a.p;sL();const r=await api({action:'login',username:a.u,password:a.p});CU=r.data;localStorage.setItem('lab_a',JSON.stringify({u:a.u,p:a.p,...CU}));hL();CU.role==='Siswa'?showS():showG();return}catch(e){localStorage.removeItem('lab_a');hL()}}$('PL').style.display='flex'}
init();
function initNav(sb,ol,ht,pid,map){const s=$(sb),o=$(ol),h=$(ht);qa('.ni',s).forEach(n=>{if(n.dataset.v)n.onclick=()=>{const v=n.dataset.v;qa('.ni',s).forEach(x=>x.classList.remove('ac'));n.classList.add('ac');qa('.vw',$(pid)).forEach(x=>x.classList.remove('ac'));const el=$('v-'+v);if(el){el.classList.add('on');el.classList.add('fi');setTimeout(()=>el.classList.remove('fi'),250)}h.textContent=n.textContent.trim();s.classList.remove('op');o.classList.remove('on');if(map&&map[v])map[v]()}});const hm=$(pid).querySelector('.ham');if(hm){hm.onclick=()=>{s.classList.add('op');o.classList.add('on')};o.onclick=()=>{s.classList.remove('op');o.classList.remove('on')}}}

function showS(){$('PL').style.display='none';$('PS').classList.add('on');$('sav').textContent=ini(CU.nama);$('snm').textContent=CU.nama;$('srl').textContent=CU.kelas||'Siswa';initNav('sb1','so1','sht','PS',{sd:loadSD,sm:loadSM,sn:loadSN,sp:loadSP});loadSD()}

async function loadSD(){const el=$('v-sd');el.innerHTML='<div class="fc" style="padding:35px"><div class="sp"></div></div>';try{const[pr,mr]=await Promise.all([api({action:'getProgres',username:CU.username}),api({action:'getMateri',username:CU.username})]);MC=mr.data;const p=pr.data,l=MC.filter(m=>m.status==='lulus').length,bl=MC.filter(m=>m.status==='belum_lulus').length,bm=MC.filter(m=>m.status==='belum').length;let cb='';for(let k in p.byKategori){const c=p.byKategori[k],pc=c.total>0?Math.round((c.selesai/c.total)*100):0;cb+='<div class="mb12"><div class="fb mb12"><span style="font-size:11.5px;font-weight:600">'+k+'</span><span style="font-size:10px;color:var(--tm)">'+c.selesai+'/'+c.total+'</span></div><div class="pb"><div class="fl" style="width:'+pc+'%"></div></div></div>'}
el.innerHTML='<div class="fi"><div style="display:flex;gap:18px;align-items:center;flex-wrap:wrap;margin-bottom:18px">'+ringH(p.persen)+'<div style="flex:1;min-width:200px"><h2 style="font-size:16px;font-weight:800;margin-bottom:2px">Progres Pembelajaran</h2><p style="font-size:11.5px;color:var(--t2)">KKNI Level II — 36 Unit Kompetensi</p><div class="g3 mt16"><div class="cd sc"><div class="si si-g"><i class="fas fa-check-circle"></i></div><div><div class="sv">'+l+'</div><div class="sl">Lulus</div></div></div><div class="cd sc"><div class="si si-r"><i class="fas fa-times-circle"></i></div><div><div class="sv">'+bl+'</div><div class="sl">Belum Lulus</div></div></div><div class="cd sc"><div class="si si-a"><i class="fas fa-clock"></i></div><div><div class="sv">'+bm+'</div><div class="sl">Belum Dikerjakan</div></div></div></div></div></div><div class="cd" style="padding:16px"><div class="stit"><i class="fas fa-layer-group"></i>Per Kategori</div>'+cb+'</div><div class="cd" style="padding:16px;margin-top:10px"><div class="stit"><i class="fas fa-bullseye"></i>Target: Lulus Semua 36 Unit</div><div class="pb" style="height:7px;margin-top:4px"><div class="fl" style="width:'+p.persen+'%"></div></div><div class="fb mt16" style="font-size:10px;color:var(--tm)"><span>'+p.selesai+' selesai</span><span>'+(p.totalUnit-p.selesai)+' tersisa</span></div></div></div>'}catch(e){el.innerHTML='<div class="emp"><i class="fas fa-exclamation-triangle"></i><p>'+e.message+'</p></div>'}}

async function loadSM(){const el=$('v-sm');el.innerHTML='<div class="fc" style="padding:35px"><div class="sp"></div></div>';try{const r=await api({action:'getMateri',username:CU.username});MC=r.data;rML()}catch(e){el.innerHTML='<div class="emp"><i class="fas fa-exclamation-triangle"></i><p>'+e.message+'</p></div>'}}
function rML(){const el=$('v-sm'),kats=['Semua',...new Set(MC.map(m=>m.kategori||'Lainnya'))];let tabs=kats.map(k=>'<div class="ctab'+(k===CC?' ac':'')+'" data-c="'+k+'">'+k+'</div>').join('');let fl=CC==='Semua'?MC:MC.filter(m=>(m.kategori||'Lainnya')===CC);let cards=fl.map(m=>'<div class="cd mc '+sB(m.status)+'" data-id="'+m.id+'"><div class="mc-c">'+m.kode+'</div><div class="mc-n">'+m.nama+'</div><div class="mc-d">'+m.deskripsi+'</div><div class="mc-f"><span class="mc-k">'+(m.kategori||'-')+'</span>'+sBd(m.status)+'</div>'+(m.status!=='belum'?'<div class="pb mt16" style="height:3px"><div class="fl'+(m.persen<70?' am':'')+'" style="width:'+m.persen+'%"></div></div><div style="font-size:9.5px;color:var(--tm);margin-top:1px">'+m.skor+'/'+m.totalSkor+' ('+m.persen+'%)</div>':'')+'</div>').join('');
el.innerHTML='<div class="fi"><div class="ctabs">'+tabs+'</div><div class="g2 stg">'+cards+'</div></div>';qa('.ctab',el).forEach(t=>t.onclick=()=>{CC=t.dataset.c;rML()});qa('.mc',el).forEach(c=>c.onclick=()=>openDet(c.dataset.id))}

async function openDet(mid){const el=$('v-sdet');el.innerHTML='<div class="fc" style="padding:35px"><div class="sp"></div></div>';qa('#PS .vw').forEach(v=>v.classList.remove('on'));el.classList.add('on');$('sht').textContent='Detail Materi';
try{const[nr]=await Promise.all([api({action:'getMateriFull',materiId:mid})]);const d=nr.data,m=d.materi;CM=m;SQ=d.soal;JW={};QI=0;QS=false;
const mr2=await api({action:'getNilai',username:CU.username});const nil=mr2.data.find(n=>n.materiId===m.id);const done=!!nil;
let subH=d.submateri.map((s,i)=>'<div class="smi"><div class="smh"><div class="smn">'+(i+1)+'</div><div class="smt">'+s.judul+'</div><i class="fas fa-chevron-down smto"></i></div><div class="smb">'+(s.konten||'<p style="color:var(--tm)">Konten belum tersedia.</p>')+'</div></div>').join('');
let lampH='';if(d.lampiran.length){let items=d.lampiran.map(l=>{let ic=l.jenis==='pdf'?'pdf':l.jenis==='youtube'?'youtube':'link';return'<div class="lamp" onclick="opMM(\''+l.url.replace(/'/g,"\\'")+'\',\''+l.jenis+'\',\''+(l.judul||'').replace(/'/g,"\\'")+'\')"><div class="lamp-i '+ic+'"><i class="fas fa-'+(l.jenis==='pdf'?'file-pdf':l.jenis==='youtube'?'play':'external-link-alt')+'"></i></div><div style="flex:1;min-width:0"><div class="lamp-t">'+l.judul+'</div><div class="lamp-tp">'+l.jenis+'</div></div><i class="fas fa-play-circle" style="color:var(--tm);font-size:13px"></i></div>'}).join('');lampH='<div class="mb20"><div class="stit"><i class="fas fa-paperclip"></i>Lampiran</div><div style="display:flex;flex-direction:column;gap:6px">'+items+'</div></div>'}
let qH='';if(SQ.length)qH='<div id="qA"><div class="fb mb16"><div class="stit" style="margin-bottom:0"><i class="fas fa-pen-to-square"></i> Latihan ('+SQ.length+')</div><span style="font-size:10px;color:var(--tm)">Target: 70%</span></div><div id="qC">'+rQ()+'</div></div>';else qH='<div class="cd" style="padding:14px;text-align:center;color:var(--tm);font-size:11.5px"><i class="fas fa-clipboard-question" style="font-size:18px;display:block;margin-bottom:4px;opacity:.3"></i>Soal belum tersedia.</div>';
el.innerHTML='<div class="fi"><div class="dh"><div class="dh-b" id="bkD"><i class="fas fa-arrow-left"></i> Kembali</div><div class="dh-c">'+m.kode+'</div><div class="dh-n">'+m.nama+'</div><div class="dh-d">'+m.deskripsi+'</div><div class="dh-m"><span class="bg bg-pr"><i class="fas fa-layer-group"></i> '+(m.kategori||'-')+'</span><span class="bg '+(done?'bg-ok':'bg-mt')+'"><i class="fas fa-'+(done?'check':'hourglass')+'"></i> '+(done?'Dikerjakan':'Belum')+'</span>'+(done?'<span style="font-size:11.5px;color:var(--t2)"><strong>'+nil.skor+'/'+nil.totalSkor+'</strong> ('+nil.persen+'%) '+sBd(nil.status)+'</span>':'')+'</div></div>'+(d.submateri.length?'<div class="mb20"><div class="stit"><i class="fas fa-book"></i>Materi</div>'+subH+'</div>':'<div class="cd" style="padding:14px;margin-bottom:14px;text-align:center;color:var(--tm);font-size:11.5px"><i class="fas fa-file-circle-plus" style="font-size:18px;display:block;margin-bottom:4px;opacity:.3"></i>Konten belum ditambahkan.</div>')+lampH+qH+'</div>';
 $('bkD').onclick=()=>{qa('#PS .vw').forEach(v=>v.classList.remove('on'));$('v-sm').classList.add('on');$('sht').textContent='Materi';qa('#sb1 .ni').forEach(n=>n.classList.remove('ac'));qs('#sb1 .ni[data-v="sm"]').classList.add('ac')};
qa('.smh',el).forEach(h=>h.onclick=()=>h.closest('.smi').classList.toggle('op'));bQ()}catch(e){el.innerHTML='<div class="emp"><i class="fas fa-exclamation-triangle"></i><p>'+e.message+'</p></div>'}}

function rQ(){if(QS)return'';const q=SQ[QI];if(!q)return'';const L=['A','B','C','D'],opts=[q.opsiA,q.opsiB,q.opsiC,q.opsiD].filter(Boolean);let nav=SQ.map((_,i)=>'<div class="qn '+(i===QI?'ac':JW[SQ[i].id]?'ans':'')+'" data-i="'+i+'">'+(i+1)+'</div>').join('');let oh=opts.map((o,j)=>{const l=L[j],s=JW[q.id]===l?'sel':'';return'<div class="qoi '+s+'" data-l="'+l+'"><div class="qil">'+l+'</div><div class="qit">'+o+'</div></div>'}).join('');return'<div class="qnv">'+nav+'</div><div class="qc"><div class="qc-n">SOAL '+(QI+1)+'/'+SQ.length+'</div><div class="qc-t">'+q.pertanyaan+'</div><div class="qo">'+oh+'</div></div><div class="qa"><button class="bt bt-o" '+(QI===0?'disabled':'')+' id="bP"><i class="fas fa-arrow-left"></i> Prev</button>'+(QI===SQ.length-1?'<button class="bt bt-p" style="padding:9px 20px" id="bS"><i class="fas fa-paper-plane"></i> Kumpulkan</button>':'<button class="bt bt-p" id="bN">Next <i class="fas fa-arrow-right"></i></button>')+'</div>'}
function bQ(){const a=$('qC');if(!a)return;qa('.qoi',a).forEach(o=>o.onclick=()=>{if(QS)return;JW[SQ[QI].id]=o.dataset.l;a.innerHTML=rQ();bQ()});qa('.qn',a).forEach(n=>n.onclick=()=>{if(QS)return;QI=+n.dataset.i;a.innerHTML=rQ();bQ()});const p=$('bP');if(p)p.onclick=()=>{QI--;a.innerHTML=rQ();bQ()};const n=$('bN');if(n)n.onclick=()=>{QI++;a.innerHTML=rQ();bQ()};const s=$('bS');if(s)s.onclick=()=>{const na=Object.keys(JW).length;if(na<SQ.length)opCF('Belum Lengkap',na+'/'+SQ.length+' dijawab. Lanjutkan?',doSub);else doSub()}}
async function doSub(){sL();try{const r=await api({action:'submitJawaban',username:CU.username,materiId:CM.id,jawaban:JSON.stringify(JW)});QS=true;const idx=MC.findIndex(m=>m.id===CM.id);if(idx>=0)MC[idx]={...MC[idx],skor:r.data.skor,persen:r.data.persen,status:r.data.status,totalSkor:r.data.totalSkor};rRes(r.data);toast(r.data.status==='lulus'?'Lulus!':'Belum lulus',r.data.status==='lulus'?'ok':'er')}catch(e){toast(e.message,'er')}finally{hL()}}

function rRes(r){const a=$('qC'),pass=r.status==='lulus';let nav=SQ.map((q,i)=>{const d=r.detail.find(x=>x.soalId===q.id);return'<div class="qn '+(d?(d.benar?'cok':'cwr'):'')+'" data-i="'+i+'">'+(i+1)+'</div>'}).join('');
let det=SQ.map((q,i)=>{const d=r.detail.find(x=>x.soalId===q.id),L=['A','B','C','D'],opts=[q.opsiA,q.opsiB,q.opsiC,q.opsiD].filter(Boolean);let oh=opts.map((o,j)=>{const l=L[j];let c='dis';if(l===d.kunci)c='cok';else if(l===d.jawab&&!d.benar)c='cwr';return'<div class="qoi '+c+'"><div class="qil">'+l+'</div><div class="qit">'+o+'</div></div>'}).join('');
return'<div class="qc" style="'+(i>0?'margin-top:12px':'')+'"><div class="qc-n">SOAL '+(i+1)+' '+(d.benar?'<span class="bg bg-ok" style="margin-left:5px">Benar</span>':'<span class="bg bg-er" style="margin-left:5px">Salah</span>')+'</div><div class="qc-t">'+q.pertanyaan+'</div><div class="qo" style="margin-top:10px">'+oh+'</div>'+(q.pembahasan?'<div class="qpb"><b>Pembahasan:</b><br>'+q.pembahasan+'</div>':'')+'</div>'}).join('');
a.innerHTML='<div class="rbox mb20"><div class="ri '+(pass?'pas':'fal')+'"><i class="fas fa-'+(pass?'trophy':'rotate-left')+'"></i></div><div class="rtit">'+(pass?'Lulus!':'Belum Lulus')+'</div><div class="rsub">'+r.benar+' dari '+r.total+' benar</div><div class="rst"><div><div class="rsv" style="color:'+(pass?'var(--ok)':'var(--er)')+'">'+r.persen+'%</div><div class="rsl">Persentase</div></div><div><div class="rsv">'+r.skor+'</div><div class="rsl">/ '+r.totalSkor+'</div></div><div><div class="rsv">'+r.benar+'/'+r.total+'</div><div class="rsl">Benar</div></div></div><div style="display:flex;gap:7px;justify-content:center;flex-wrap:wrap"><button class="bt bt-o" id="bRev"><i class="fas fa-eye"></i> Review</button><button class="bt bt-p" id="bBk2"><i class="fas fa-arrow-left"></i> Kembali</button></div></div><div id="revA" style="display:none"><div class="qnv mb16">'+nav+'</div>'+det+'</div>';
 $('bRev').onclick=()=>{const r2=$('revA');r2.style.display=r2.style.display==='none'?'block':'none'};
 $('bBk2').onclick=()=>openDet(CM.id);
qa('.qn',a).forEach(n=>n.onclick=()=>{const ci=+n.dataset.i,cards=a.querySelectorAll('.qc');if(cards[ci])cards[ci].scrollIntoView({behavior:'smooth',block:'center'})})}

async function loadSN(){const el=$('v-sn');el.innerHTML='<div class="fc" style="padding:35px"><div class="sp"></div></div>';try{const[nr,mr]=await Promise.all([api({action:'getNilai',username:CU.username}),api({action:'getMateri'})]);const n=nr.data,am=mr.data;if(!n.length){el.innerHTML='<div class="emp"><i class="fas fa-file-circle-xmark"></i><p>Belum ada nilai</p></div>';return}
const l=n.filter(x=>x.status==='lulus').length,av=Math.round(n.reduce((s,x)=>s+x.persen,0)/n.length);
let rows=n.map(x=>{const m=am.find(a=>a.id===x.materiId);return'<tr><td style="font-weight:600;font-size:10px;color:var(--p)">'+(m?m.kode:'-')+'</td><td style="font-weight:600">'+(m?m.nama:'-')+'</td><td>'+x.skor+'/'+x.totalSkor+'</td><td><div class="pb" style="width:80px;display:inline-block;vertical-align:middle"><div class="fl'+(x.persen<70?' am':'')+'" style="width:'+x.persen+'%"></div></div> <span style="font-size:10.5px;font-weight:600">'+x.persen+'%</span></td><td>'+sBd(x.status)+'</td><td style="font-size:10.5px;color:var(--tm)">'+fDt(x.timestamp)+'</td></tr>'}).join('');
el.innerHTML='<div class="fi"><div class="g3 mb16"><div class="cd sc"><div class="si si-g"><i class="fas fa-check-circle"></i></div><div><div class="sv">'+l+'/'+n.length+'</div><div class="sl">Lulus</div></div></div><div class="cd sc"><div class="si si-t"><i class="fas fa-chart-line"></i></div><div><div class="sv">'+av+'%</div><div class="sl">Rata-rata</div></div></div><div class="cd sc"><div class="si si-a"><i class="fas fa-clock"></i></div><div><div class="sv">'+(n.length-l)+'</div><div class="sl">Belum Lulus</div></div></div></div><div class="tw"><table><thead><tr><th>Kode</th><th>Unit</th><th>Skor</th><th>Persen</th><th>Status</th><th>Waktu</th></tr></thead><tbody>'+rows+'</tbody></table></div></div>'}catch(e){el.innerHTML='<div class="emp"><i class="fas fa-exclamation-triangle"></i><p>'+e.message+'</p></div>'}}

function loadSP(){$('v-sp').innerHTML='<div class="fi"><div class="cd" style="padding:24px;max-width:420px"><div style="display:flex;align-items:center;gap:12px;margin-bottom:16px"><div style="width:50px;height:50px;background:linear-gradient(135deg,var(--p),var(--a));border-radius:12px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;font-weight:800">'+ini(CU.nama)+'</div><div><div style="font-size:16px;font-weight:800">'+CU.nama+'</div><div style="font-size:11.5px;color:var(--tm)">'+(CU.kelas||'-')+'</div></div></div><div style="display:flex;flex-direction:column;gap:8px"><div class="fb" style="padding:8px 0;border-bottom:1px solid var(--bl)"><span style="font-size:11.5px;color:var(--tm)">Username</span><span style="font-size:11.5px;font-weight:600">'+CU.username+'</span></div><div class="fb" style="padding:8px 0;border-bottom:1px solid var(--bl)"><span style="font-size:11.5px;color:var(--tm)">Peran</span><span style="font-size:11.5px;font-weight:600">Siswa</span></div><div class="fb" style="padding:8px 0;border-bottom:1px solid var(--bl)"><span style="font-size:11.5px;color:var(--tm)">Kompetensi</span><span style="font-size:11.5px;font-weight:600">Analisis Pengujian Lab</span></div><div class="fb" style="padding:8px 0"><span style="font-size:11.5px;color:var(--tm)">KKNI</span><span style="font-size:11.5px;font-weight:600">Level II</span></div></div></div></div>'}

function showG(){$('PL').style.display='none';$('PG').classList.add('on');$('gav').textContent=ini(CU.nama);$('gnm').textContent=CU.nama;initNav('sb2','so2','ght','PG',{gd:loadGD,gs:loadGS,gm:loadGM,gp:loadGP});loadGD()}

async function loadGD(){const el=$('v-gd');el.innerHTML='<div class="fc" style="padding:35px"><div class="sp"></div></div>';try{const r=await api({action:'getDashboardGuru'});const d=r.data;
el.innerHTML='<div class="fi"><div style="display:flex;gap:18px;align-items:center;flex-wrap:wrap;margin-bottom:18px">'+ringH(d.completionRate,110,7,'var(--a)')+'<div style="flex:1;min-width:200px"><h2 style="font-size:16px;font-weight:800;margin-bottom:2px">Overview</h2><p style="font-size:11.5px;color:var(--t2)">Analisis Pengujian Laboratorium — KKNI II</p><div class="g2 mt16"><div class="cd sc"><div class="si si-g"><i class="fas fa-users"></i></div><div><div class="sv">'+d.totalSiswa+'</div><div class="sl">Siswa</div></div></div><div class="cd sc"><div class="si si-t"><i class="fas fa-book-open"></i></div><div><div class="sv">'+d.totalUnit+'</div><div class="sl">Unit</div></div></div><div class="cd sc"><div class="si si-a"><i class="fas fa-trophy"></i></div><div><div class="sv">'+d.totalSelesai+'</div><div class="sl">Lulus</div></div></div><div class="cd sc"><div class="si si-r"><i class="fas fa-chart-simple"></i></div><div><div class="sv">'+d.rataRata+'%</div><div class="sl">Rata-rata</div></div></div></div></div></div><div class="cd" style="padding:16px"><div class="stit"><i class="fas fa-info-circle"></i>Info Sistem</div><div class="g2" style="gap:8px;font-size:11.5px"><div style="padding:10px;background:var(--p50);border-radius:var(--rs)"><b style="color:var(--pd)">Kompetensi</b><br>Analisis Pengujian Lab</div><div style="padding:10px;background:var(--al);border-radius:var(--rs)"><b style="color:var(--ad)">KKNI Level</b><br>Level II</div><div style="padding:10px;background:var(--okl);border-radius:var(--rs)"><b style="color:#059669">Unit Kompetensi</b><br>36 Unit</div><div style="padding:10px;background:var(--wnl);border-radius:var(--rs)"><b style="color:#D97706">Target Lulus</b><br>70% per unit</div></div></div></div>'}catch(e){el.innerHTML='<div class="emp"><i class="fas fa-exclamation-triangle"></i><p>'+e.message+'</p></div>'}}

async function loadGS(){const el=$('v-gs');el.innerHTML='<div class="fc" style="padding:35px"><div class="sp"></div></div>';try{const r=await api({action:'getAllSiswa'});const s=r.data;if(!s.length){el.innerHTML='<div class="emp"><i class="fas fa-user-slash"></i><p>Belum ada siswa</p></div>';return}
let rows=s.map(x=>'<tr><td><div style="display:flex;align-items:center;gap:7px"><div style="width:28px;height:28px;background:var(--pl);color:var(--p);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:9.5px;font-weight:700;flex-shrink:0">'+ini(x.nama)+'</div><div><div style="font-weight:600;font-size:11.5px">'+x.nama+'</div><div style="font-size:9.5px;color:var(--tm)">'+x.username+'</div></div></div></td><td>'+(x.kelas||'-')+'</td><td><div class="pb" style="width:60px;display:inline-block;vertical-align:middle"><div class="fl'+(x.persen<50?' am':'')+'" style="width:'+x.persen+'%"></div></div> <span style="font-size:10.5px;font-weight:600">'+x.selesai+'/'+x.totalUnit+'</span></td><td style="font-weight:700;font-size:11.5px;color:'+(x.persen>=70?'var(--ok)':x.persen>=40?'var(--wn)':'var(--er)')+'">'+x.persen+'%</td><td><button class="bt bt-sm bt-o" onclick="openGDet(\''+x.username+'\')"><i class="fas fa-eye"></i> Detail</button></td></tr>').join('');
el.innerHTML='<div class="fi"><div class="cd" style="padding:12px;margin-bottom:12px;display:flex;align-items:center;gap:8px"><i class="fas fa-users" style="color:var(--p)"></i><span style="font-size:11.5px;font-weight:600">Total: <b>'+s.length+'</b> siswa</span></div><div class="tw"><table><thead><tr><th>Siswa</th><th>Kelas</th><th>Progres</th><th>%</th><th>Aksi</th></tr></thead><tbody>'+rows+'</tbody></table></div></div>'}catch(e){el.innerHTML='<div class="emp"><i class="fas fa-exclamation-triangle"></i><p>'+e.message+'</p></div>'}}

async function openGDet(un){const el=$('v-gdet');el.innerHTML='<div class="fc" style="padding:35px"><div class="sp"></div></div>';qa('#PG .vw').forEach(v=>v.classList.remove('on'));el.classList.add('on');$('ght').textContent='Detail Siswa';try{const r=await api({action:'getDetailSiswa',username:un});const d=r.data,nm=d[0]?d[0].nama:un,l=d.filter(m=>m.status==='lulus').length,pc=d.length>0?Math.round((l/d.length)*100):0;
let rows=d.map(m=>'<tr><td style="font-size:10px;font-weight:700;color:var(--p)">'+m.kode+'</td><td style="font-size:11.5px;font-weight:600">'+m.nama+'</td><td style="font-size:10.5px">'+(m.skor!==null?m.skor+'/'+m.totalSkor:'-')+'</td><td>'+(m.skor!==null?'<div class="pb" style="width:50px;display:inline-block;vertical-align:middle"><div class="fl'+(m.persen<70?' am':'')+'" style="width:'+m.persen+'%"></div></div> <span style="font-size:9.5px;font-weight:600">'+m.persen+'%</span>':'-')+'</td><td>'+sBd(m.status)+'</td><td>'+(m.status!=='belum'?'<button class="bt bt-sm bt-d" onclick="resetOne(\''+un+'\',\''+m.id+'\')"><i class="fas fa-rotate-left"></i></button>':'')+'</td></tr>').join('');
el.innerHTML='<div class="fi"><div class="dh"><div class="dh-b" id="bkG"><i class="fas fa-arrow-left"></i> Kembali</div><div style="display:flex;align-items:center;gap:12px;margin-top:5px"><div style="width:40px;height:40px;background:linear-gradient(135deg,var(--p),var(--a));border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:15px;font-weight:800">'+ini(nm)+'</div><div><div style="font-size:16px;font-weight:800">'+nm+'</div><div style="font-size:11px;color:var(--tm)">'+un+'</div></div><div style="margin-left:auto">'+ringH(pc,80,6)+'</div></div><div style="margin-top:8px;font-size:11.5px;color:var(--t2)">'+l+'/'+d.length+' unit lulus</div></div><div class="tw"><table><thead><tr><th>Kode</th><th>Unit</th><th>Skor</th><th>%</th><th>Status</th><th></th></tr></thead><tbody>'+rows+'</tbody></table></div><div style="margin-top:12px;text-align:right"><button class="bt bt-d bt-sm" onclick="resetAll(\''+un+'\')"><i class="fas fa-rotate-left"></i> Reset Semua</button></div></div>';
 $('bkG').onclick=backGS}catch(e){el.innerHTML='<div class="emp"><i class="fas fa-exclamation-triangle"></i><p>'+e.message+'</p></div>'}}
function backGS(){qa('#PG .vw').forEach(v=>v.classList.remove('on'));$('v-gs').classList.add('on');$('ght').textContent='Data Siswa';qa('#sb2 .ni').forEach(n=>n.classList.remove('ac'));qs('#sb2 .ni[data-v="gs"]').classList.add('ac')}
async function resetOne(u,m){opCF('Reset','Nilai unit ini dihapus?',async()=>{sL();try{await api({action:'resetNilai',username:u,materiId:m});toast('Reset','ok');openGDet(u)}catch(e){toast(e.message,'er')}finally{hL()}})}
async function resetAll(u){opCF('Reset Semua','Semua nilai dihapus!',async()=>{sL();try{await api({action:'resetNilai',username:u});toast('Semua direset','ok');openGDet(u)}catch(e){toast(e.message,'er')}finally{hL()}})}

async function loadGM(){const el=$('v-gm');el.innerHTML='<div class="fc" style="padding:35px"><div class="sp"></div></div>';try{const r=await api({action:'getMonitorMatrix'});const d=r.data,s=d.siswa,m=d.materi;if(!s.length){el.innerHTML='<div class="emp"><i class="fas fa-user-slash"></i><p>Belum ada siswa</p></div>';return}
let th='<th>Siswa</th>';m.forEach(x=>{th+='<th style="font-size:8.5px;padding:6px 3px;text-align:center" title="'+x.nama+'">'+x.kode.replace('UK.','')+'</th>'});th+='<th style="text-align:center">%</th>';
let rows='';for(let si of s){rows+='<tr><td style="font-weight:600;font-size:10px;white-space:nowrap">'+si.nama+'</td>';for(let c of si.cells){let cd='';if(c.status==='belum')cd='<span style="color:var(--b)">—</span>';else if(c.status==='lulus')cd='<span style="color:var(--ok)" title="'+c.persen+'%"><i class="fas fa-check"></i></span>';else cd='<span style="color:var(--er)" title="'+c.persen+'%"><i class="fas fa-xmark"></i></span>';rows+='<td style="text-align:center;font-size:9px">'+cd+'</td>'}rows+='<td style="text-align:center;font-weight:800;font-size:10px;color:'+(si.persen>=70?'var(--ok)':si.persen>=40?'var(--wn)':'var(--er)')+'">'+si.persen+'%</td></tr>'}
el.innerHTML='<div class="fi"><div class="cd" style="padding:12px;margin-bottom:12px"><div class="stit" style="margin-bottom:3px"><i class="fas fa-table-cells"></i>Matriks Nilai</div><div style="font-size:10px;color:var(--tm)"><i class="fas fa-check" style="color:var(--ok)"></i> Lulus <i class="fas fa-xmark" style="color:var(--er)"></i> Belum <span style="color:var(--b)">—</span> Belum</div></div><div class="tw" style="font-size:9px"><table><thead><tr>'+th+'</tr></thead><tbody>'+rows+'</tbody></table></div></div>'}catch(e){el.innerHTML='<div class="emp"><i class="fas fa-exclamation-triangle"></i><p>'+e.message+'</p></div>'}}

function loadGP(){$('v-gp').innerHTML='<div class="fi"><div class="cd" style="padding:24px;max-width:420px"><div style="display:flex;align-items:center;gap:12px;margin-bottom:16px"><div style="width:50px;height:50px;background:linear-gradient(135deg,var(--p),var(--a));border-radius:12px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;font-weight:800">'+ini(CU.nama)+'</div><div><div style="font-size:16px;font-weight:800">'+CU.nama+'</div><div style="font-size:11.5px;color:var(--tm)">Guru / Instruktur</div></div></div><div style="display:flex;flex-direction:column;gap:8px"><div class="fb" style="padding:8px 0;border-bottom:1px solid var(--bl)"><span style="font-size:11.5px;color:var(--tm)">Username</span><span style="font-size:11.5px;font-weight:600">'+CU.username+'</span></div><div class="fb" style="padding:8px 0"><span style="font-size:11.5px;color:var(--tm)">Kompetensi</span><span style="font-size:11.5px;font-weight:600">Analisis Pengujian Lab</span></div></div></div></div>'}
</script>
